<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="error.css" />
    <title>404 - Page Not Found</title>
  </head>
  <body>
    <main>
      <div class="stack">
        <div class="badge">404 Not Found</div>
      </div>
      <h1>We cannot find this resource</h1>
      <p>
        The link might be broken, the page may have moved, or you might not have
        access.
      </p>
      <div class="actions">
        <a class="button" href="/">Go back to Home</a>
      </div>
      <p class="small">
        If you think this is a mistake, check the URL or contact support.
      </p>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Deliveroo — Home</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <nav>
      <span class="brand">Deliveroo</span>
      <form method="POST" action="/auth/logout">
        <button type="submit">Log out</button>
      </form>
    </nav>

    <div class="container">
      <h1 style="font-size:1.3rem; color:#111;">
        Welcome back, <strong>{{userEmail}}</strong>
      </h1>

      <div class="card">
        <h2>Available Restaurants</h2>
        <ul class="item-list">
          {{restaurantList}}
        </ul>
      </div>
    </div>
  </body>
</html>
